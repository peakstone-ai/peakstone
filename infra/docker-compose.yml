# Peakstone server stack — Postgres + API + Caddy (auto-HTTPS).
#
# Local smoke test (self-signed cert, https://localhost):
#     docker compose -f infra/docker-compose.yml up --build
# Production (peakstone.ai):  set the values in infra/.env (see infra/.env.example), then
#     ./infra/deploy.sh
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peakstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peakstone}
      POSTGRES_DB: ${POSTGRES_DB:-peakstone}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peakstone}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    environment:
      PEAKSTONE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-peakstone}:${POSTGRES_PASSWORD:-peakstone}@db:5432/${POSTGRES_DB:-peakstone}
      # the suite the default (held-out) leaderboard scopes to, so the headline is apples-to-apples
      PEAKSTONE_OFFICIAL_SUITE: ${PEAKSTONE_OFFICIAL_SUITE:-level-standard@2026.06}
      # operator key(s) whose runs rank (M2); without this the ranked held-out board is empty
      PEAKSTONE_TRUSTED_PUBKEYS: ${PEAKSTONE_TRUSTED_PUBKEYS:-}
      # GitHub OAuth for `peakstone login` / account binding — unset = binding disabled
      PEAKSTONE_GITHUB_CLIENT_ID: ${PEAKSTONE_GITHUB_CLIENT_ID:-}
      PEAKSTONE_GITHUB_CLIENT_SECRET: ${PEAKSTONE_GITHUB_CLIENT_SECRET:-}
      # client-version policy served at /version (blank -> latest=server version, min=0.1.0)
      PEAKSTONE_CLIENT_LATEST: ${PEAKSTONE_CLIENT_LATEST:-}
      PEAKSTONE_CLIENT_MIN: ${PEAKSTONE_CLIENT_MIN:-}
    # apply migrations, then serve. Migrations run before the app so the schema is current on deploy.
    command: ["sh", "-c", "alembic upgrade head && uvicorn peakstone.api.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        # the site fetches the API server-side, so it uses the API container's internal address
        NEXT_PUBLIC_API_URL: http://api:8000
    depends_on: [api]
    restart: unless-stopped

  caddy:
    image: caddy:2
    environment:
      PEAKSTONE_DOMAIN: ${PEAKSTONE_DOMAIN:-localhost}
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certificates (persist across restarts to avoid LE rate limits)
      - caddy_config:/config
    depends_on: [api, web]
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
