# Two isolated nodes on a private network. The server serves a file; the client fetches it.
# Each node's program discovers the topology via env vars: the server reads $PORT; the client
# reads $PEER_SERVER_HOST / $PEER_SERVER_PORT.

[[nodes]]
name = "server"
image = "python:3.12-slim"
start = "python server.py"
background = true
ports = [8080]

[[nodes]]
name = "client"
image = "python:3.12-slim"
start = "python client.py"
needs = ["server"]
