# A broker fans published messages out to subscribers by topic. A publisher posts a fixed sequence;
# two subscribers (each pinned to one topic via a topic.txt fixture) must end up mirroring exactly
# their topic's messages, in publish order. Local provider; peers found via PEER_<NAME>_HOST/PORT.

[[nodes]]
name = "broker"
image = "python:3.12-slim"
start = "python broker.py"
background = true
ports = [9000]

[[nodes]]
name = "subscriber_a"
image = "python:3.12-slim"
start = "python subscriber.py"
background = true
needs = ["broker"]

[[nodes]]
name = "subscriber_b"
image = "python:3.12-slim"
start = "python subscriber.py"
background = true
needs = ["broker"]

[[nodes]]
name = "publisher"
image = "python:3.12-slim"
start = "python publisher.py"
needs = ["broker"]
