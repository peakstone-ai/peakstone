# A coordinator drives two-phase commit across three participants for two transactions. Each
# participant's vote per transaction is fixed by a votes.txt fixture. t1: all vote yes -> commit
# everywhere; t2: one participant votes no -> abort everywhere (atomicity in both directions).
# Local provider; participants discovered via PEER_<NAME>_HOST/PORT.

[[nodes]]
name = "participant0"
image = "python:3.12-slim"
start = "python participant.py"
background = true
ports = [9000]

[[nodes]]
name = "participant1"
image = "python:3.12-slim"
start = "python participant.py"
background = true
ports = [9000]

[[nodes]]
name = "participant2"
image = "python:3.12-slim"
start = "python participant.py"
background = true
ports = [9000]

[[nodes]]
name = "coordinator"
image = "python:3.12-slim"
start = "python coordinator.py"
needs = ["participant0", "participant1", "participant2"]
