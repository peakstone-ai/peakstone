# Four peers, partitioned A={peer0,peer1} | B={peer2,peer3} by a firewall. The verifier heals
# the network at runtime and requires CRDT convergence. Needs docker/microvm (real firewall).

[[nodes]]
name = "peer0"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ['peer1', 'peer2', 'peer3']

[[nodes]]
name = "peer1"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ['peer0', 'peer2', 'peer3']

[[nodes]]
name = "peer2"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ['peer0', 'peer1', 'peer3']

[[nodes]]
name = "peer3"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ['peer0', 'peer1', 'peer2']

[[links]]
from = "peer0"
to = "peer2"
firewall = "blocked"

[[links]]
from = "peer0"
to = "peer3"
firewall = "blocked"

[[links]]
from = "peer1"
to = "peer2"
firewall = "blocked"

[[links]]
from = "peer1"
to = "peer3"
firewall = "blocked"
