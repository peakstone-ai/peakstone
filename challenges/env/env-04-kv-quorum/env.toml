# Three Go replicas (quorum KV) + a client. Writes hit a W=2 quorum; reads must quorum-read.
# Discovery via PORT + PEER_<NAME>_HOST/PORT.

[[nodes]]
name = "peer0"
image = "golang:1.23"
start = "go run ."
background = true
ports = [7000]
needs = ['peer1', 'peer2']

[[nodes]]
name = "peer1"
image = "golang:1.23"
start = "go run ."
background = true
ports = [7000]
needs = ['peer0', 'peer2']

[[nodes]]
name = "peer2"
image = "golang:1.23"
start = "go run ."
background = true
ports = [7000]
needs = ['peer0', 'peer1']

[[nodes]]
name = "client"
image = "golang:1.23"
start = "go run ."
needs = ['peer0', 'peer1', 'peer2']
