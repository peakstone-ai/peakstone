# Three peers on a private network, fully connected (each knows the other two). No coordinator.
# Each peer starts with a number (fixtures/<peer>/value.txt) and must learn the GLOBAL maximum by
# gossiping with its peers, then write it to result.txt.

[[nodes]]
name = "peer0"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ["peer1", "peer2"]

[[nodes]]
name = "peer1"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ["peer0", "peer2"]

[[nodes]]
name = "peer2"
image = "python:3.12-slim"
start = "python peer.py"
background = true
ports = [9000]
needs = ["peer0", "peer1"]
