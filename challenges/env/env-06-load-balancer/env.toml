# A router fronts three identical backends. A client sends 9 sequential requests to the router,
# which must distribute them round-robin so each backend handles an equal third. No internet, no
# network shaping — runs on the local provider. Each node discovers peers via PEER_<NAME>_HOST/PORT.

[[nodes]]
name = "backend0"
image = "python:3.12-slim"
start = "python server.py"
background = true
ports = [9000]

[[nodes]]
name = "backend1"
image = "python:3.12-slim"
start = "python server.py"
background = true
ports = [9000]

[[nodes]]
name = "backend2"
image = "python:3.12-slim"
start = "python server.py"
background = true
ports = [9000]

[[nodes]]
name = "router"
image = "python:3.12-slim"
start = "python router.py"
background = true
ports = [9000]
needs = ["backend0", "backend1", "backend2"]

[[nodes]]
name = "client"
image = "python:3.12-slim"
start = "python client.py"
needs = ["router"]
