[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "peakstone"
version = "0.1.0"
description = "A public, reproducible benchmark platform tracking the capability frontier of open models (coding, agentic, planning)."
readme = "README.md"
requires-python = ">=3.11"   # tomllib (3.11) + PEP-604 unions
license = "Apache-2.0"
authors = [{ name = "The Peakstone Authors" }]
keywords = ["llm", "benchmark", "evaluation", "reproducibility", "coding", "agents", "gpu"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "jsonschema>=4",
    "cryptography>=41",
]

[project.optional-dependencies]
# the submission/leaderboard API (Postgres + FastAPI). The engine itself needs neither.
api = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
]
dev = ["pytest>=8", "httpx>=0.27"]

[project.scripts]
peakstone-bench = "engine.runner:main"

[project.urls]
Homepage = "https://peakstone.ai"
Source = "https://github.com/peakstone-ai/peakstone"

[tool.setuptools.packages.find]
include = ["engine*", "api*"]
exclude = ["*.tests", "*.tests.*"]

# NOTE (pre-PyPI): the engine currently resolves schema/, challenges/, serve/ and config.toml
# relative to the repo root, so `pip install -e .` (editable, in-repo) works today but a built wheel
# would not ship those data files. Before publishing: move schema/taxonomy data into the package as
# package-data, decide how challenges/ ship (bundled vs fetched), and namespace the import packages
# (engine -> peakstone.engine) to avoid top-level name collisions on PyPI.
