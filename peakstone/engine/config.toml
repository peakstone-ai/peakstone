# Harness configuration.
[server]
# Base host where llama-server instances run. Per-model ports come from serve/models.toml,
# mirrored here so the harness knows where to reach each model.
host = "127.0.0.1"

[gateway]
# `peakstone serve` — the standing llama-swap-style OpenAI gateway. One front port; the request's
# `model` field selects which registry model is loaded (the backend llama-server is swapped on
# demand). Use host "0.0.0.0" to expose it on the LAN (like serve.sh); 127.0.0.1 keeps it local.
host = "127.0.0.1"
port = 12434   # default front port (11434 is Ollama's; keep them distinct so both can run)
idle_timeout_s = 0   # unload the model after this many idle seconds to free VRAM; 0 = never

[models]
# model name -> port (must match serve/models.toml)
"glm-4.7-flash"      = 8081
"qwen3-coder"        = 8082
"devstral"           = 8083
"qwen2.5-coder-32b"  = 8084

[judge]
enabled = true
# Which served model acts as the local judge (offline). Point at any of [models].
# Can later be aimed at Claude by setting base_url/api_key below.
model = "qwen3-coder"
# Optional override endpoint (e.g. Anthropic-compatible gateway). Empty = use [server]+[models] port.
base_url = ""
api_key  = ""

[run]
temperature   = 0.2
max_tokens    = 6144
request_timeout = 600   # seconds per model call
sandbox       = "subprocess"   # subprocess | docker
node_bin      = "~/opt/node/bin"   # prepended to PATH for js/ts runners

[run.envs]
# Per-suite python interpreter for running tests, keyed by the directory name under
# challenges/. Library-heavy benchmarks pin their own versions in an isolated env so
# reference solutions run against the libraries they were authored for (e.g. BigCodeBench
# needs pandas<3 / numpy<2). Suites omitted here use the base `python` on PATH.
# Build the BigCodeBench env with ./build_bcb_env.sh (Python 3.10 + its requirements-eval.txt).
bigcodebench = "~/miniconda3/envs/peakstone-bcb/bin/python"
