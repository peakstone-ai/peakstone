name: Release

# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
# Or dry-run to TestPyPI from the Actions tab (Run workflow -> target: testpypi).
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no stored token. This ONLY works once the
# publisher is registered on PyPI, otherwise the publish step fails with an OIDC "invalid-publisher"
# error (the build job still passes, which is why a green build can precede a failed release).
# Register it at https://pypi.org/manage/project/peakstone/settings/publishing/ with EXACTLY:
#     Owner: peakstone-ai   Repository: peakstone   Workflow: release.yml   Environment: pypi
# and the same for TestPyPI (Environment: testpypi) if you use the dry-run path.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build "twine>=6.1" "packaging>=24.2"
          python -m build
          twine check dist/*
      - name: Verify the git tag matches the package version
        if: github.event_name == 'push'
        run: |
          pkg=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=$tag pyproject=$pkg"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg — bump pyproject first (scripts/cut_release.sh)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # manual dry-run only
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write          # OIDC: trusted publishing, no stored token
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true          # re-running a failed run won't error on already-uploaded files

  publish-pypi:
    # real release: a pushed tag, or a manual run explicitly targeting pypi
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC: trusted publishing, no stored token
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true          # idempotent re-runs: don't fail if the version is already up
      - name: Create GitHub Release with the built artifacts
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "$GITHUB_REF_NAME"
